<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjugaciones en Contexto — Castellano</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --bg2: #f2ede5;
    --bg3: #e8e1d6;
    --bg4: #ddd5c8;
    --border: #ccc4b8;
    --border2: #b8ada0;
    --amber: #c45820;
    --amber2: #d97840;
    --amber3: #f0a870;
    --amber-dim: #a04418;
    --red: #b83028;
    --green: #3a7848;
    --blue: #2858a0;
    --text: #24180e;
    --text2: #6a5040;
    --text3: #9a8878;
    --text-bright: #140c04;
    --sidebar-w: 260px;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #sidebar-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--amber);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  #sidebar-header p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  #search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 7px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--text3); }
  #search:focus { border-color: var(--amber-dim); }

  #filters {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex-shrink: 0;
  }

  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .filter-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
  .filter-btn.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber3); }

  #nav-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  #nav-list::-webkit-scrollbar { width: 4px; }
  #nav-list::-webkit-scrollbar-track { background: transparent; }
  #nav-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 18px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active {
    background: var(--bg4);
    border-left-color: var(--amber);
  }

  .nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    min-width: 28px;
    flex-shrink: 0;
  }
  .nav-item.active .nav-num { color: var(--amber); }

  .nav-preview {
    font-family: 'Crimson Pro', serif;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }
  .nav-item.active .nav-preview { color: var(--text); }

  .nav-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    padding: 1px 4px;
    border-radius: 2px;
    background: var(--bg4);
    color: var(--amber-dim);
    flex-shrink: 0;
    border: 1px solid var(--border2);
  }

  #sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
  }

  /* ── MAIN ── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 40px 48px;
  }

  #top-bar {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  #top-bar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-bright);
    letter-spacing: 0.01em;
  }

  #toggle-btn {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.2s;
    text-align: left;
    margin-bottom: 8px;
  }
  #toggle-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
  #toggle-btn.hidden-mode { background: var(--amber-dim); border-color: var(--amber); color: var(--amber3); }

  /* ── FRAGMENT CARD ── */
  .fragment {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 28px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .fragment:hover { border-color: var(--border2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fragment-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  .frag-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    font-weight: 500;
    letter-spacing: 0.05em;
    min-width: 30px;
  }

  .situacion-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 8px;
    letter-spacing: 0.03em;
    flex: 1;
  }

  .pattern-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--bg4);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    letter-spacing: 0.06em;
  }

  .fragment-sentence {
    padding: 22px 24px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    line-height: 1.55;
    color: var(--text-bright);
    font-style: italic;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }

  .fragment-sentence strong {
    font-style: normal;
    font-weight: 700;
    color: var(--amber2);
    font-size: 22px;
  }

  /* ── CONJUGATIONS ── */
  .conjugations {
    padding: 0;
  }

  .conj-block {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .conj-block:last-child { border-bottom: none; }

  .conj-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .verb-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--amber2);
    font-style: italic;
  }

  .tense-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 8px;
  }

  .conj-table {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .conj-cell {
    background: var(--bg);
    padding: 7px 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .pronoun {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    min-width: 72px;
    flex-shrink: 0;
  }

  .form {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    color: var(--text);
    font-style: italic;
  }

  .conj-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    font-style: normal;
    margin-top: 8px;
    letter-spacing: 0.02em;
    line-height: 1.5;
  }

  /* ── HIDDEN MODE ── */
  body.conjugations-hidden .conjugations {
    display: none;
  }
  body.conjugations-hidden .reveal-btn {
    display: flex;
  }

  .reveal-btn {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 14px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    gap: 8px;
    border-top: 1px solid var(--border);
    transition: color 0.2s;
  }
  .reveal-btn:hover { color: var(--amber); }
  .reveal-btn::before { content: '▶'; font-size: 8px; }

  /* ── NO RESULTS ── */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── HEADER DECORATION ── */
  .amber-line {
    height: 2px;
    background: linear-gradient(90deg, var(--amber), transparent);
    margin-bottom: 3px;
  }

  /* ── MOBILE BAR ── */
  #mobile-bar { display: none; }
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 4, 0.45);
    z-index: 90;
  }

  @media (max-width: 720px) {
    #mobile-bar {
      display: flex;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      gap: 10px;
      z-index: 110;
    }

    #hamburger {
      background: none;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--text2);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #hamburger:hover { border-color: var(--amber); color: var(--amber); }

    #mobile-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    #toggle-btn-mobile {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      padding: 0;
    }
    #toggle-btn-mobile:hover { border-color: var(--amber-dim); color: var(--amber); }
    #toggle-btn-mobile.hidden-mode { background: var(--amber-dim); border-color: var(--amber); color: var(--amber3); }

    #sidebar {
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      top: 52px;
    }
    body.sidebar-open #sidebar { transform: translateX(0); }
    body.sidebar-open #overlay { display: block; }

    #main {
      margin-left: 0;
      padding: 68px 16px 32px;
    }

    #toggle-btn { display: none; }

    .conj-table {
      grid-template-columns: 1fr;
    }

    .fragment-sentence {
      font-size: 17px;
      padding: 16px 16px 14px;
    }

    .fragment-header {
      padding: 10px 16px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .conj-block { padding: 14px 16px; }

    .conj-header { gap: 8px; }
  }
</style>
</head>
<body>

<!-- MOBILE BAR -->
<div id="mobile-bar">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <span id="mobile-title">Conjugaciones en Contexto</span>
  <button id="toggle-btn-mobile" onclick="toggleConjugations()" aria-label="Ocultar conjugaciones"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
</div>
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="amber-line"></div>
    <h1>Conjugaciones<br>en Contexto</h1>
    <p>Castellano · 145 fragmentos</p>
  </div>
  <div id="search-wrap">
    <input type="text" id="search" placeholder="Buscar verbo o situación…">
  </div>
  <div id="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="p1">P1 Hipotético</button>
    <button class="filter-btn" data-filter="p2">P2 Pasado irreal</button>
    <button class="filter-btn" data-filter="p3">P3 Mixto</button>
    <button class="filter-btn" data-filter="p4">P4 Ojalá pres.</button>
    <button class="filter-btn" data-filter="p5">P5 Ojalá pas.</button>
    <button class="filter-btn" data-filter="p6">P6 Como si</button>
    <button class="filter-btn" data-filter="p7">P7 Aunque</button>
    <button class="filter-btn" data-filter="p8">P8 Debería/habría</button>
  </div>
  <div id="nav-list"></div>
  <div id="sidebar-footer">
    <button id="toggle-btn" onclick="toggleConjugations()">Ocultar conjugaciones</button>
    <div id="counter">145 fragmentos visibles</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="top-bar">
    <h2>Práctica de Conjugación</h2>
  </div>
  <div id="fragments-container"></div>
  <div id="no-results">— sin resultados —</div>
</div>

<script>
const FRAGS = [
  {
    id: "001",
    situacion: "Hablando del día con un amigo",
    sentence: `Hoy <strong>he estado</strong> todo el día en casa porque <strong>tenía</strong> un poco de fiebre.`,
    verbs: [
      {
        verb: "he estado", tense: "Pretérito perfecto compuesto", infinitive: "estar",
        forms: [["yo","he estado"],["tú","has estado"],["él/ella","ha estado"],["nosotros","hemos estado"],["vosotros","habéis estado"],["ellos/ellas","han estado"]]
      },
      {
        verb: "tenía", tense: "Pretérito imperfecto de indicativo", infinitive: "tener",
        forms: [["yo","tenía"],["tú","tenías"],["él/ella","tenía"],["nosotros","teníamos"],["vosotros","teníais"],["ellos/ellas","tenían"]]
      }
    ]
  },
  {
    id: "002",
    situacion: "Quedando con un amigo",
    sentence: `¿<strong>Quedamos</strong> esta tarde o <strong>tienes</strong> algo que <strong>hacer</strong>?`,
    verbs: [
      {
        verb: "quedamos", tense: "Presente de indicativo", infinitive: "quedar",
        forms: [["yo","quedo"],["tú","quedas"],["él/ella","queda"],["nosotros","quedamos"],["vosotros","quedáis"],["ellos/ellas","quedan"]]
      },
      {
        verb: "tienes", tense: "Presente de indicativo", infinitive: "tener",
        forms: [["yo","tengo"],["tú","tienes"],["él/ella","tiene"],["nosotros","tenemos"],["vosotros","tenéis"],["ellos/ellas","tienen"]]
      },
      {
        verb: "hacer", tense: "Infinitivo", infinitive: "hacer", note: "Usado como infinitivo tras «que».", forms: []
      }
    ]
  },
  {
    id: "003",
    situacion: "En el médico",
    sentence: `Doctor, <strong>llevo</strong> tres días con dolor de cabeza y esta mañana <strong>he vomitado</strong> dos veces.`,
    verbs: [
      {
        verb: "llevo", tense: "Presente de indicativo", infinitive: "llevar",
        forms: [["yo","llevo"],["tú","llevas"],["él/ella","lleva"],["nosotros","llevamos"],["vosotros","lleváis"],["ellos/ellas","llevan"]]
      },
      {
        verb: "he vomitado", tense: "Pretérito perfecto compuesto", infinitive: "vomitar",
        forms: [["yo","he vomitado"],["tú","has vomitado"],["él/ella","ha vomitado"],["nosotros","hemos vomitado"],["vosotros","habéis vomitado"],["ellos/ellas","han vomitado"]]
      }
    ]
  },
  {
    id: "004",
    situacion: "En una tienda, buscando algo que viste",
    sentence: `Ayer <strong>vi</strong> unos zapatos en el escaparate y ahora no los <strong>encuentro</strong> por ningún sitio.`,
    verbs: [
      {
        verb: "vi", tense: "Pretérito indefinido", infinitive: "ver",
        forms: [["yo","vi"],["tú","viste"],["él/ella","vio"],["nosotros","vimos"],["vosotros","visteis"],["ellos/ellas","vieron"]]
      },
      {
        verb: "encuentro", tense: "Presente de indicativo", infinitive: "encontrar",
        forms: [["yo","encuentro"],["tú","encuentras"],["él/ella","encuentra"],["nosotros","encontramos"],["vosotros","encontráis"],["ellos/ellas","encuentran"]]
      }
    ]
  },
  {
    id: "005",
    situacion: "En la peluquería",
    sentence: `<strong>Quiero</strong> que me <strong>dejéis</strong> el flequillo un poco más largo que la última vez.`,
    verbs: [
      {
        verb: "quiero", tense: "Presente de indicativo", infinitive: "querer",
        forms: [["yo","quiero"],["tú","quieres"],["él/ella","quiere"],["nosotros","queremos"],["vosotros","queréis"],["ellos/ellas","quieren"]]
      },
      {
        verb: "dejéis", tense: "Presente de subjuntivo", infinitive: "dejar",
        forms: [["yo","deje"],["tú","dejes"],["él/ella","deje"],["nosotros","dejemos"],["vosotros","dejéis"],["ellos/ellas","dejen"]]
      }
    ]
  },
  {
    id: "006",
    situacion: "Contando un viaje a un amigo",
    sentence: `El verano pasado <strong>fuimos</strong> a Lisboa y <strong>nos quedamos</strong> una semana entera.`,
    verbs: [
      {
        verb: "fuimos", tense: "Pretérito indefinido", infinitive: "ir",
        forms: [["yo","fui"],["tú","fuiste"],["él/ella","fue"],["nosotros","fuimos"],["vosotros","fuisteis"],["ellos/ellas","fueron"]]
      },
      {
        verb: "nos quedamos", tense: "Pretérito indefinido", infinitive: "quedarse",
        forms: [["yo","me quedé"],["tú","te quedaste"],["él/ella","se quedó"],["nosotros","nos quedamos"],["vosotros","os quedasteis"],["ellos/ellas","se quedaron"]]
      }
    ]
  },
  {
    id: "007",
    situacion: "Haciendo planes",
    sentence: `Si <strong>hace</strong> buen tiempo el finde, <strong>podríamos</strong> ir a la sierra.`,
    verbs: [
      {
        verb: "hace", tense: "Presente de indicativo", infinitive: "hacer",
        forms: [["yo","hago"],["tú","haces"],["él/ella","hace"],["nosotros","hacemos"],["vosotros","hacéis"],["ellos/ellas","hacen"]]
      },
      {
        verb: "podríamos", tense: "Condicional simple", infinitive: "poder",
        forms: [["yo","podría"],["tú","podrías"],["él/ella","podría"],["nosotros","podríamos"],["vosotros","podríais"],["ellos/ellas","podrían"]]
      }
    ]
  },
  {
    id: "008",
    situacion: "Explicando síntomas al médico",
    sentence: `Me <strong>duele</strong> mucho la garganta desde ayer y <strong>tengo</strong> dificultad para <strong>tragar</strong>.`,
    verbs: [
      {
        verb: "duele", tense: "Presente de indicativo", infinitive: "doler",
        forms: [["yo","duelo"],["tú","dueles"],["él/ella","duele"],["nosotros","dolemos"],["vosotros","doléis"],["ellos/ellas","duelen"]]

// ── RENDER ──
function buildConjTable(forms) {
  if (!forms || forms.length === 0) return '';
  return `<div class="conj-table">${forms.map(([p,f]) =>
    `<div class="conj-cell"><span class="pronoun">${p}</span><span class="form">${f}</span></div>`
  ).join('')}</div>`;
}

function renderFragment(f) {
  const patternBadge = f.pattern ? `<span class="pattern-badge">${f.pattern}</span>` : '';
  const verbBlocks = f.verbs.map(v => {
    const table = buildConjTable(v.forms);
    const note = v.note ? `<div class="conj-note">※ ${v.note}</div>` : '';
    return `<div class="conj-block">
      <div class="conj-header">
        <span class="verb-name">${v.verb}</span>
        <span class="tense-name">${v.tense}</span>
      </div>
      ${table}${note}
    </div>`;
  }).join('');

  return `<div class="fragment" id="frag-${f.id}" data-pattern="${(f.pattern||'').toLowerCase()}">
    <div class="fragment-header">
      <span class="frag-num">${f.id}</span>
      <span class="situacion-tag">situación · ${f.situacion}</span>
      ${patternBadge}
    </div>
    <div class="fragment-sentence">${f.sentence}</div>
    <div class="conjugations">${verbBlocks}</div>
    <div class="reveal-btn" onclick="revealConj(this)">Mostrar conjugaciones</div>
  </div>`;
}

function revealConj(btn) {
  const frag = btn.closest('.fragment');
  frag.querySelector('.conjugations').style.display = 'block';
  btn.style.display = 'none';
}

function buildNavItem(f, hidden) {
  const preview = f.sentence.replace(/<[^>]+>/g,'').slice(0,34) + '…';
  const badge = f.pattern ? `<span class="nav-tag">${f.pattern}</span>` : '';
  return `<div class="nav-item${hidden?' hidden':''}" data-id="${f.id}" data-pattern="${(f.pattern||'').toLowerCase()}" onclick="scrollTo('${f.id}')">
    <span class="nav-num">${f.id}</span>
    <span class="nav-preview">${preview}</span>
    ${badge}
  </div>`;
}

// Initial render
const container = document.getElementById('fragments-container');
const navList = document.getElementById('nav-list');
container.innerHTML = FRAGS.map(renderFragment).join('');
navList.innerHTML = FRAGS.map(f => buildNavItem(f, false)).join('');
updateCounter();

// ── SCROLL TO ──
function scrollTo(id) {
  const el = document.getElementById('frag-'+id);
  if (el) {
    el.scrollIntoView({behavior:'smooth', block:'start'});
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.querySelector(`.nav-item[data-id="${id}"]`);
    if (navEl) navEl.classList.add('active');
  }
}

// Highlight nav on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('frag-','');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navEl = document.querySelector(`.nav-item[data-id="${id}"]`);
      if (navEl) {
        navEl.classList.add('active');
        navEl.scrollIntoView({block:'nearest'});
      }
    }
  });
}, {threshold: 0.3});
document.querySelectorAll('.fragment').forEach(f => observer.observe(f));

// ── SIDEBAR TOGGLE (mobile) ──
function toggleSidebar() {
  document.body.classList.toggle('sidebar-open');
}
function closeSidebar() {
  document.body.classList.remove('sidebar-open');
}
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', closeSidebar);
});

// ── TOGGLE CONJUGATIONS ──
let conjVisible = true;
function toggleConjugations() {
  conjVisible = !conjVisible;
  document.body.classList.toggle('conjugations-hidden', !conjVisible);
  const label = conjVisible ? 'Ocultar conjugaciones' : 'Mostrar conjugaciones';
  document.getElementById('toggle-btn').textContent = label;
  document.getElementById('toggle-btn').classList.toggle('hidden-mode', !conjVisible);
  const mob = document.getElementById('toggle-btn-mobile');
  mob.setAttribute('aria-label', label);
  mob.classList.toggle('hidden-mode', !conjVisible);
  const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeOff = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  mob.innerHTML = conjVisible ? eyeOpen : eyeOff;
  if (conjVisible) {
    document.querySelectorAll('.conjugations').forEach(c => c.style.display = '');
    document.querySelectorAll('.reveal-btn').forEach(b => b.style.display = 'none');
  }
}

// ── SEARCH ──
document.getElementById('search').addEventListener('input', function() {
  filterFragments();
});

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    filterFragments();
  });
});

function filterFragments() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

  let visible = 0;
  FRAGS.forEach(f => {
    const fragEl = document.getElementById('frag-'+f.id);
    const navEl = document.querySelector(`.nav-item[data-id="${f.id}"]`);
    const pattern = (f.pattern||'').toLowerCase();

    const matchesFilter = activeFilter === 'all' || pattern === activeFilter;
    const searchTarget = (f.situacion + ' ' + f.sentence + ' ' + f.verbs.map(v=>v.verb+' '+v.infinitive).join(' ')).toLowerCase().replace(/<[^>]+>/g,'');
    const matchesSearch = !query || searchTarget.includes(query);

    const show = matchesFilter && matchesSearch;
    fragEl.style.display = show ? '' : 'none';
    if (navEl) navEl.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  updateCounter();
}

function updateCounter() {
  const visible = document.querySelectorAll('.fragment:not([style*="display: none"])').length;
  document.getElementById('counter').textContent = `${visible} fragmento${visible !== 1 ? 's' : ''} visible${visible !== 1 ? 's' : ''}`;
}
</script>
